<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Navy background circle -->
  <circle cx="16" cy="16" r="16" fill="#1B4F72"/>

  <!-- Passport (centre, simplified) -->
