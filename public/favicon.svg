  <rect x="12" y="8" width="1.5" height="11" rx="0.5" fill="#0E2D42"/>
  <circle cx="16" cy="12" r="2.5" fill="#E67E22"/>
  <polyline points="14.5,12 15.5,13.2 17.5,11" stroke="white" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dog (left, simplified) -->
  <!-- Head -->
  <circle cx="8" cy="13" r="4.5" fill="#E8A87C"/>
  <!-- Ear -->
  <ellipse cx="5.5" cy="15" rx="2" ry="3" fill="#D4855A" transform="rotate(-15,5.5,15)"/>
