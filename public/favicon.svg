  <circle cx="7" cy="12" r="1.2" fill="white"/>
  <circle cx="7" cy="12" r="0.8" fill="#2C1810"/>
  <!-- Nose -->
  <ellipse cx="8.5" cy="14" rx="1.2" ry="0.9" fill="#2C1810"/>

  <!-- Cat (right, simplified) -->
  <!-- Ear -->
