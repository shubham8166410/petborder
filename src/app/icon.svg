<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Brand navy background -->
  <circle cx="16" cy="16" r="16" fill="#1B4F72"/>

  <!-- Cat paw — white, centred -->
  <!-- Main pad (large oval at bottom) -->
  <ellipse cx="16" cy="20" rx="5.5" ry="4.5" fill="white"/>

  <!-- Top-left toe -->
  <ellipse cx="9.5" cy="14.5" rx="2.8" ry="2.2" fill="white" transform="rotate(-20 9.5 14.5)"/>

  <!-- Top-centre toe -->
  <ellipse cx="16" cy="11.5" rx="2.8" ry="2.2" fill="white"/>

  <!-- Top-right toe -->
  <ellipse cx="22.5" cy="14.5" rx="2.8" ry="2.2" fill="white" transform="rotate(20 22.5 14.5)"/>
</svg>
